services:
  micron-parser-go-web:
    container_name: micron-parser-go-web
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8080:8080"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    cpus: "1.00"
    mem_limit: 256m
    pids_limit: 128
    restart: unless-stopped
